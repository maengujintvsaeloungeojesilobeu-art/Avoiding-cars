<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 닿기 레이스! - 럭키/다이 라운드</title>
    <style>
        /* --- 디자인 및 레이아웃 --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(to bottom, #00c3ff 0%, #ffffea 80%, #f4e4bc 100%);
            transition: background 0.5s ease;
        }

        body.storm-active { background: linear-gradient(to bottom, #004e7a 0%, #a0a08b 80%, #8d7d5a 100%); }
        body.lucky-active { background: linear-gradient(to bottom, #ff9ff3 0%, #feca57 80%, #ff6b6b 100%); }

        #game-container { position: relative; width: 100vw; height: 100vh; }

        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            z-index: 10; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .info-box {
            background: rgba(0,0,0,0.4);
            padding: 10px 20px; border-radius: 15px;
            margin-bottom: 10px; font-size: 20px; font-weight: bold;
        }

        #storm-timer, #lucky-timer { display: none; font-size: 18px; margin-top: 5px; border: 2px solid #fff; }

        #player {
            position: absolute; bottom: 80px; left: 50%;
            font-size: 60px; transform: translate(-50%, 0);
            z-index: 5; user-select: none;
        }

        .obstacle { position: absolute; font-size: 50px; z-index: 4; }
        .trap { position: absolute; font-size: 55px; z-index: 4; filter: drop-shadow(0 0 5px white); }
        .lucky-box { position: absolute; font-size: 50px; z-index: 6; animation: rotate 1.5s infinite linear; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .msg-overlay {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-weight: bold; text-align: center;
            z-index: 200; opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .msg-overlay.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        #event-title { font-size: 70px; color: #fff; text-shadow: 0 0 20px #ff00ff; }
        #lucky-result { font-size: 45px; color: #fff; text-shadow: 0 0 10px #000; }

        .result-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 20px;
            text-align: center; display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); z-index: 100;
        }

        .btn-restart {
            padding: 15px 30px; font-size: 20px;
            background-color: #0077be; color: white;
            border: none; border-radius: 10px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-panel">
        <div class="info-box">🍊 현재 점수: <span id="score">100</span></div>
        <div class="info-box" style="background: rgba(255, 140, 0, 0.6);">🏆 최고 기록: <span id="best-score">0</span></div>
        <div id="storm-timer" class="info-box" style="background: rgba(255,0,0,0.5);">🌊 폭풍우! 남은시간: <span id="s-timer-sec">10</span>s</div>
        <div id="lucky-timer" class="info-box" style="background: rgba(155, 89, 182, 0.7);">🎁 행운라운드! 남은시간: <span id="l-timer-sec">10</span>s</div>
    </div>

    <div id="player">🏎️</div>
    <div id="event-title" class="msg-overlay">이벤트 알림</div>
    <div id="lucky-result" class="msg-overlay"></div>
    
    <div id="game-over" class="result-screen">
        <h1 style="color:#ff4757;">GAME OVER</h1>
        <p id="final-result"></p>
        <button class="btn-restart" onclick="resetGame()">다시 도전하기</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('score');
    const bestScoreDisplay = document.getElementById('best-score');
    const container = document.getElementById('game-container');
    const eventTitle = document.getElementById('event-title');
    const luckyResultMsg = document.getElementById('lucky-result');
    const stormUI = document.getElementById('storm-timer');
    const luckyUI = document.getElementById('lucky-timer');

    let score = 100;
    let bestScore = parseInt(localStorage.getItem('jeju_best_score')) || 0;
    let playerX = window.innerWidth / 2;
    let playerY = 80;
    let obstacles = [];
    let traps = []; 
    let luckyBoxes = [];
    let isGameActive = true;
    let isStormActive = false;
    let isLuckyActive = false;
    let currentSpeed = 7;
    
    let stormClearedMilestones = new Set();
    let luckyClearedMilestones = new Set();

    const keys = { w: false, a: false, s: false, d: false };
    bestScoreDisplay.innerText = bestScore;

    window.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true; });
    window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; });

    function handlePlayerMovement() {
        if (!isGameActive) return;
        const moveSpeed = 10;
        if (keys.a) playerX -= moveSpeed;
        if (keys.d) playerX += moveSpeed;
        if (keys.w) playerY += moveSpeed;
        if (keys.s) playerY -= moveSpeed;
        playerX = Math.max(50, Math.min(window.innerWidth - 50, playerX));
        playerY = Math.max(20, Math.min(window.innerHeight - 150, playerY));
        player.style.left = playerX + 'px';
        player.style.bottom = playerY + 'px';
    }

    function spawnObstacle() {
        if (!isGameActive) return;
        const el = document.createElement('div');
        el.className = 'obstacle'; el.innerText = '🚗';
        el.style.left = (Math.random() * (window.innerWidth - 100) + 50) + 'px';
        el.style.top = '-70px'; 
        container.appendChild(el);
        obstacles.push({ el, y: -70 });
        setTimeout(spawnObstacle, Math.max(250, 1200 - (score * 1.5)));
    }

    function spawnTrap() {
        if (!isGameActive || !isStormActive) return;
        const el = document.createElement('div');
        el.className = 'trap'; el.innerText = '🌊';
        el.style.left = (Math.random() * (window.innerWidth - 100) + 50) + 'px';
        el.style.top = '-70px'; 
        container.appendChild(el);
        traps.push({ el, y: -70 });
        setTimeout(spawnTrap, 600);
    }

    function spawnLuckyBox() {
        if (!isGameActive || !isLuckyActive) return;
        const el = document.createElement('div');
        el.className = 'lucky-box'; el.innerText = '🎁';
        el.style.left = (Math.random() * (window.innerWidth - 100) + 50) + 'px';
        el.style.top = '-70px';
        container.appendChild(el);
        luckyBoxes.push({ el, y: -70 });
        setTimeout(spawnLuckyBox, 300); 
    }

    function startStorm(milestone) {
        if (isStormActive || isLuckyActive) return;
        isStormActive = true;
        document.body.classList.add('storm-active');
        showTitle("폭풍우 주의! 🌊", "#00ffff");
        stormUI.style.display = 'block';
        let time = 10;
        document.getElementById('s-timer-sec').innerText = time;
        const interval = setInterval(() => {
            time--; document.getElementById('s-timer-sec').innerText = time;
            if (time <= 0 || !isGameActive) { 
                clearInterval(interval); isStormActive = false;
                stormClearedMilestones.add(milestone);
                document.body.classList.remove('storm-active');
                stormUI.style.display = 'none';
            }
        }, 1000);
        spawnTrap();
    }

    function startLuckyRound(milestone) {
        if (isLuckyActive || isStormActive) return;
        isLuckyActive = true;
        document.body.classList.add('lucky-active');
        showTitle("행운 혹은 시련! 🎁", "#fff");
        luckyUI.style.display = 'block';
        let time = 10;
        document.getElementById('l-timer-sec').innerText = time;
        const interval = setInterval(() => {
            time--; document.getElementById('l-timer-sec').innerText = time;
            if (time <= 0 || !isGameActive) { 
                clearInterval(interval); isLuckyActive = false;
                luckyClearedMilestones.add(milestone);
                document.body.classList.remove('lucky-active');
                luckyUI.style.display = 'none';
            }
        }, 1000);
        spawnLuckyBox();
    }

    function showTitle(text, color) {
        eventTitle.innerText = text;
        eventTitle.style.textShadow = `0 0 20px ${color}`;
        eventTitle.classList.add('active');
        setTimeout(() => eventTitle.classList.remove('active'), 1500);
    }

    function openLuckyBox(index) {
        const box = luckyBoxes[index];
        box.el.remove(); luckyBoxes.splice(index, 1);
        
        // --- 확률 밸런스 패치 ---
        const r = Math.random();
        if (r < 0.33) { 
            score += 20;
            popMsg("🍀 행운! +20", "#7bed9f"); 
        } else if (r < 0.66) { 
            popMsg("💨 꽝!", "#f1f2f6"); 
        } else { 
            score -= 10; 
            popMsg("💣 폭탄광! -10", "#ff4757"); 
        }
        updateScore();
        if (score <= 0) gameOver();
    }

    function popMsg(text, color) {
        luckyResultMsg.innerText = text;
        luckyResultMsg.style.color = color;
        luckyResultMsg.classList.add('active');
        setTimeout(() => luckyResultMsg.classList.remove('active'), 500);
    }

    function gameLoop() {
        if (!isGameActive) return;
        handlePlayerMovement();
        currentSpeed = 7 + (Math.floor(score / 50) * 1.5);

        // 폭풍우
        let sMile = Math.floor(score / 200) * 200;
        if (score >= 200 && !isStormActive && !isLuckyActive && !stormClearedMilestones.has(sMile)) startStorm(sMile);
        stormClearedMilestones.forEach(m => { if (score < m) stormClearedMilestones.delete(m); });

        // 행운 라운드 (240 & 310, 410...)
        let currentLuckyMile = -1;
        if (score >= 240 && score < 310) currentLuckyMile = 240;
        else if (score >= 310) currentLuckyMile = Math.floor((score - 10) / 100) * 100 + 10;

        if (currentLuckyMile !== -1 && !isLuckyActive && !isStormActive && !luckyClearedMilestones.has(currentLuckyMile)) {
            startLuckyRound(currentLuckyMile);
        }
        // 무한 재발동: 점수가 해당 기준점 아래로 떨어지면 기록 삭제
        luckyClearedMilestones.forEach(m => { if (score < m) luckyClearedMilestones.delete(m); });

        const pRect = player.getBoundingClientRect();
        moveAndCheck(obstacles, currentSpeed, () => { score += 10; updateScore(); });
        moveAndCheck(traps, currentSpeed * 1.2, () => { score -= 10; updateScore(); if (score <= 0) gameOver(); }, true);
        moveAndCheck(luckyBoxes, currentSpeed * 0.9, (i) => { openLuckyBox(i); });

        requestAnimationFrame(gameLoop);
    }

    function moveAndCheck(arr, speed, onHit, isTrap = false) {
        for (let i = arr.length - 1; i >= 0; i--) {
            let o = arr[i]; o.y += speed; o.el.style.top = o.y + 'px';
            const r = o.el.getBoundingClientRect();
            const p = player.getBoundingClientRect();
            if (r.left < p.right && r.right > p.left && r.top < p.bottom && r.bottom > p.top) {
                onHit(i); if(arr[i]) { arr[i].el.remove(); arr.splice(i, 1); }
            } else if (o.y > window.innerHeight) {
                if (!isTrap && arr === obstacles) { score -= 10; updateScore(); if (score <= 0) gameOver(); }
                o.el.remove(); arr.splice(i, 1);
            }
        }
    }

    function updateScore() {
        scoreDisplay.innerText = score;
        if (score > bestScore) {
            bestScore = score; bestScoreDisplay.innerText = bestScore;
            localStorage.setItem('jeju_best_score', bestScore.toString());
        }
    }

    function gameOver() {
        isGameActive = false;
        document.getElementById('final-result').innerText = `최종 점수: ${score}점 / 최고 기록: ${bestScore}점`;
        document.getElementById('game-over').style.display = 'block';
    }

    function resetGame() { location.reload(); }

    spawnObstacle();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
