<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>제주 레이스 (개선판)</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(to bottom, #00c3ff 0%, #ffffea 80%, #f4e4bc 100%);
            touch-action: manipulation;
        }

        body.storm-active { background: linear-gradient(to bottom, #004e7a 0%, #a0a08b 80%, #8d7d5a 100%); }
        body.lucky-active { background: linear-gradient(to bottom, #ff9ff3 0%, #feca57 80%, #ff6b6b 100%); }

        #game-container { position: relative; width: 100vw; height: 100vh; }

        #ui-panel {
            position: absolute; top: 10px; left: 10px;
            z-index: 10; color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .info-box {
            background: rgba(0,0,0,0.4);
            padding: 5px 12px; border-radius: 10px;
            margin-bottom: 5px; font-size: 14px; font-weight: bold;
        }

        #player {
            position: absolute; bottom: 120px; left: 50%;
            font-size: 50px; transform: translate(-50%, 0);
            z-index: 5;
            /* transition 제거: 키보드 반응 속도를 즉각적으로 만들기 위함 */
        }

        /* 컨트롤 버튼 (모바일 전용) */
        #controls {
            position: absolute; bottom: 30px;
            width: 100%; display: none; 
            justify-content: space-around;
            padding: 0 20px; box-sizing: border-box;
            z-index: 100;
        }

        .control-btn {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid white; border-radius: 50%;
            font-size: 30px; display: flex;
            align-items: center; justify-content: center;
            user-select: none;
        }

        .obstacle, .trap, .lucky-box { position: absolute; z-index: 4; }
        .obstacle { font-size: 40px; }
        .trap { font-size: 45px; }
        .lucky-box { font-size: 40px; animation: rotate 1s infinite linear; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 결과창 (작게 수정) */
        .result-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px; border-radius: 12px; /* 크기 축소 */
            text-align: center; display: none; z-index: 1000; 
            width: 220px; /* 너비 고정으로 작게 만듦 */
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .result-screen h2 { font-size: 20px; margin: 10px 0; color: #ff4757; }
        .result-screen p { font-size: 14px; margin-bottom: 15px; }

        .btn-restart {
            padding: 8px 16px; font-size: 14px; cursor: pointer;
            background-color: #0077be; color: white; border: none; border-radius: 5px;
        }

        .msg-overlay {
            position: absolute; top: 30%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-weight: bold; text-align: center;
            z-index: 200; opacity: 0; width: 80%;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .msg-overlay.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        #event-title { font-size: 35px; color: #fff; text-shadow: 0 0 10px #ff00ff; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-panel">
        <div class="info-box" style="background: #ff4757;">🔥 HARD MODE</div>
        <div class="info-box">🍊 점수: <span id="score">100</span></div>
        <div class="info-box">🏆 최고: <span id="best-score">0</span></div>
        <div id="storm-timer" class="info-box" style="display:none; background: #2f3542;">🌊 <span id="s-timer-sec">10</span>s</div>
        <div id="lucky-timer" class="info-box" style="display:none; background: #5758bb;">🎁 <span id="l-timer-sec">10</span>s</div>
    </div>

    <div id="player">🏎️</div>
    <div id="event-title" class="msg-overlay"></div>
    
    <div id="controls">
        <div class="control-btn" id="btn-left">◀</div>
        <div class="control-btn" id="btn-right">▶</div>
    </div>

    <div id="game-over" class="result-screen">
        <h2>게임아웃</h2>
        <p id="final-result"></p>
        <p style="font-size:12px; color:#666;">다시 도전 해보실래요?</p>
        <button class="btn-restart" onclick="location.reload()">다시 시작</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('score');
    const container = document.getElementById('game-container');
    const eventTitle = document.getElementById('event-title');
    const controls = document.getElementById('controls');
    
    let score = 100;
    let bestScore = parseInt(localStorage.getItem('jeju_best_score')) || 0;
    let playerX = window.innerWidth / 2;
    let obstacles = [], traps = [], luckyBoxes = [];
    let isGameActive = true, isStormActive = false, isLuckyActive = false;
    
    // 🔥 하드모드 속도 재설정 (상향)
    let baseSpeed = 8; 
    let moveDir = 0;
    const keys = {}; // 중복 키 입력 해결을 위한 객체
    
    let stormClearedMilestones = new Set();
    let luckyClearedMilestones = new Set();

    document.getElementById('best-score').innerText = bestScore;

    // 기기 감지
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    if (isMobile) {
        controls.style.display = 'flex';
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = -1; });
        document.getElementById('btn-left').addEventListener('touchend', () => moveDir = 0);
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = 1; });
        document.getElementById('btn-right').addEventListener('touchend', () => moveDir = 0);
    } else {
        // PC WASD 조작감 최적화
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
    }

    function spawnObstacle() {
        if (!isGameActive) return;
        const el = document.createElement('div');
        el.className = 'obstacle'; el.innerText = '🚗';
        el.style.left = (Math.random() * (window.innerWidth - 60) + 30) + 'px';
        el.style.top = '-50px'; 
        container.appendChild(el);
        obstacles.push({ el, y: -50 });
        setTimeout(spawnObstacle, Math.max(150, 1000 - (score * 2)));
    }

    function spawnTrap() {
        if (!isGameActive || !isStormActive) return;
        const el = document.createElement('div');
        el.className = 'trap'; el.innerText = '🌊';
        el.style.left = (Math.random() * (window.innerWidth - 60) + 30) + 'px';
        el.style.top = '-50px'; 
        container.appendChild(el);
        traps.push({ el, y: -50 });
        setTimeout(spawnTrap, 400);
    }

    function spawnLuckyBox() {
        if (!isGameActive || !isLuckyActive) return;
        const el = document.createElement('div');
        el.className = 'lucky-box'; el.innerText = '🎁';
        el.style.left = (Math.random() * (window.innerWidth - 60) + 30) + 'px';
        el.style.top = '-50px';
        container.appendChild(el);
        luckyBoxes.push({ el, y: -50 });
        setTimeout(spawnLuckyBox, 300); 
    }

    function updateGame() {
        if (!isGameActive) return;

        // PC 조작 계산
        if (!isMobile) {
            moveDir = 0;
            if (keys['a']) moveDir = -1;
            if (keys['d']) moveDir = 1;
        }

        // 플레이어 이동 (반응속도 상향)
        if (moveDir === -1) playerX -= 12;
        if (moveDir === 1) playerX += 12;
        playerX = Math.max(30, Math.min(window.innerWidth - 30, playerX));
        player.style.left = playerX + 'px';

        let currentSpeed = baseSpeed + (score / 80);

        // 이벤트 로직
        let sMile = Math.floor(score / 200) * 200;
        if (score >= 200 && !isStormActive && !isLuckyActive && !stormClearedMilestones.has(sMile)) {
            startEvent("폭풍우!", "storm");
        }
        stormClearedMilestones.forEach(m => { if (score < m) stormClearedMilestones.delete(m); });

        let lMile = (score >= 240 && score < 310) ? 240 : Math.floor((score - 10) / 100) * 100 + 10;
        if (lMile >= 240 && !isLuckyActive && !isStormActive && !luckyClearedMilestones.has(lMile)) {
            startEvent("행운!", "lucky");
        }
        luckyClearedMilestones.forEach(m => { if (score < lMile) luckyClearedMilestones.delete(m); });

        processObj(obstacles, currentSpeed, () => { score += 10; });
        processObj(traps, currentSpeed * 1.5, () => { score -= 10; });
        processObj(luckyBoxes, currentSpeed, (i) => {
            const r = Math.random();
            if (r < 0.33) score += 20;
            else if (r > 0.66) score -= 10;
        });

        if (score <= 0) gameOver();
        updateScore();
        requestAnimationFrame(updateGame);
    }

    function startEvent(txt, type) {
        eventTitle.innerText = txt;
        eventTitle.classList.add('active');
        setTimeout(() => eventTitle.classList.remove('active'), 1500);
        
        if(type === "storm") {
            isStormActive = true;
            document.body.classList.add('storm-active');
            document.getElementById('storm-timer').style.display = 'block';
            spawnTrap();
            setTimeout(() => {
                isStormActive = false; stormClearedMilestones.add(Math.floor(score/200)*200);
                document.body.classList.remove('storm-active');
                document.getElementById('storm-timer').style.display = 'none';
            }, 10000);
        } else {
            isLuckyActive = true;
            document.body.classList.add('lucky-active');
            document.getElementById('lucky-timer').style.display = 'block';
            spawnLuckyBox();
            setTimeout(() => {
                isLuckyActive = false; 
                let currentL = (score >= 240 && score < 310) ? 240 : Math.floor((score - 10) / 100) * 100 + 10;
                luckyClearedMilestones.add(currentL);
                document.body.classList.remove('lucky-active');
                document.getElementById('lucky-timer').style.display = 'none';
            }, 10000);
        }
    }

    function processObj(arr, speed, onHit) {
        for (let i = arr.length - 1; i >= 0; i--) {
            let o = arr[i]; o.y += speed; o.el.style.top = o.y + 'px';
            const r = o.el.getBoundingClientRect();
            const p = player.getBoundingClientRect();
            if (r.left < p.right && r.right > p.left && r.top < p.bottom && r.bottom > p.top) {
                onHit(i); o.el.remove(); arr.splice(i, 1);
            } else if (o.y > window.innerHeight) {
                if (arr === obstacles) { score -= 10; }
                o.el.remove(); arr.splice(i, 1);
            }
        }
    }

    function updateScore() {
        scoreDisplay.innerText = score;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('jeju_best_score', bestScore);
            document.getElementById('best-score').innerText = bestScore;
        }
    }

    function gameOver() {
        isGameActive = false;
        document.getElementById('final-result').innerText = `최종: ${score}점`;
        document.getElementById('game-over').style.display = 'block';
    }

    spawnObstacle();
    updateGame();
</script>
</body>
</html>
